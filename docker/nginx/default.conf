# HRFlow: SPA at /, Laravel API at /api (php-fpm in the `backend` service)
server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # ── Laravel API ──
    location /api {
        fastcgi_pass backend:9000;
        include fastcgi_params;
        # every /api route enters through Laravel's front controller
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param PATH_INFO $uri;
    }

    # ── React SPA (static build) ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # client-side routing: unknown paths fall back to the SPA shell
        try_files $uri $uri/ /index.html;
    }

    # cache immutable build assets aggressively
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
